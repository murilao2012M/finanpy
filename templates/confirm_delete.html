{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-modern">
            <div class="card-body-modern p-4 p-lg-5">
                <span class="eyebrow">Ação sensível</span>
                <h1 class="page-title page-title-sm">{{ titulo }}</h1>
                <p class="page-subtitle">Tem certeza de que deseja excluir <strong>{{ objeto }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-premium-danger">Confirmar exclusão</button>
                    <a href="javascript:history.back()" class="btn btn-premium-outline">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
