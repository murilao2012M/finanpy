{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-7">
        <div class="card-modern">
            <div class="card-body-modern p-4 p-lg-5">
                <span class="eyebrow">Formulário</span>
                <h1 class="page-title page-title-sm">{{ titulo }}</h1>
                <p class="page-subtitle">Cadastre os dados do cartão para controlar limite e vencimento.</p>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="field-label">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-premium">Salvar</button>
                        <a href="{% url 'lista_cartoes' %}" class="btn btn-premium-outline">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
