{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card card-modern auth-single-card">
        <div class="card-body-modern p-4 p-lg-5 text-center">
            <span class="auth-badge">Senha Atualizada</span>
            <h1 class="page-title page-title-sm">Login Liberado Novamente</h1>
            <p class="page-subtitle mx-auto">Sua senha foi redefinida com sucesso. Agora você pode entrar no FinanPy.</p>
            <a href="{% url 'login' %}" class="btn btn-premium mt-3">Entrar No FinanPy</a>
        </div>
    </div>
    <footer class="register-footer register-footer-wide auth-login-footer">
        <div class="register-footer-brand">
            <strong>FinanPy</strong>
            <span>Este site é propriedade do FinanPy.</span>
        </div>
        <div class="register-footer-legal">
            <span>FinanPy 2026. Todos os Direitos Reservados.</span>
        </div>
    </footer>
</div>
{% endblock %}
