databases:
  - name: finanpy-db
    databaseName: finanpy
    user: finanpy
    plan: free

services:
  - type: web
    name: finanpy
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn finanpy.wsgi:application
    healthCheckPath: /healthz/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finanpy-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ENABLE_HTTPS
        value: "True"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FINANPY_SITE_URL
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_BASE_URL
        value: https://api.mercadopago.com
      - key: EMAIL_BACKEND
        value: financeiro.email_backends.BrevoAPIEmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "2525"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_TIMEOUT
        value: "20"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_API_URL
        value: https://api.brevo.com/v3/smtp/email
      - key: BREVO_API_TIMEOUT
        value: "20"
